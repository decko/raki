# RAKI Development Pipeline — SODA Phase Configuration
#
# Phases: triage → plan → implement → patch (corrective) → verify → review → submit → follow-up → monitor
#
# The review phase acts as a parallel multi-specialist code review gate.
# If review finds CRITICAL or IMPORTANT issues, it routes back to
# implement for rework (handled by the pipeline engine).
#
# The patch phase is a corrective phase triggered by verify failures.
# It uses a smaller model for targeted fixes before escalating to
# full implement.

phases:
  - name: triage
    prompt: prompts/triage.md
    schema: schemas/triage.json
    tools:
      - Read
      - Glob
      - Grep
      - Bash(git:*)
      - Bash(ls:*)
      - Bash(uv:run raki metrics*)
    timeout: 5m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    depends_on: []

  - name: plan
    prompt: prompts/plan.md
    schema: schemas/plan.json
    model: claude-opus-4-6[1m]
    tools:
      - Read
      - Glob
      - Grep
      - Bash(git:*)
      - Bash(ls:*)
    timeout: 10m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    depends_on:
      - triage

  - name: implement
    prompt: prompts/implement.md
    schema: schemas/implement.json
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
    timeout: 30m
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - plan
    feedback_from:
      - review
      - verify

  - name: patch
    type: corrective
    prompt: prompts/patch.md
    model: claude-sonnet-4-6
    schema: schemas/patch.json
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
    timeout: 8m
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - implement
    feedback_from:
      - verify

  - name: verify
    prompt: prompts/verify.md
    schema: schemas/verify.json
    model: claude-opus-4-6[1m]
    tools:
      - Read
      - Glob
      - Grep
      - Bash
    timeout: 15m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    corrective:
      phase: patch
      max_attempts: 2
      on_exhausted: stop
      escalate_to: implement
    depends_on:
      - plan
      - implement

  - name: review
    type: parallel-review
    model: claude-opus-4-6[1m]
    schema: schemas/review.json
    tools:
      - Read
      - Glob
      - Grep
      - Bash(git:*)
      - Bash(uv:run pytest*)
      - Bash(uv:run ruff*)
      - Bash(uv:run ty*)
    timeout: 12m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    depends_on:
      - plan
      - implement
      - verify
    min_reviewers: 1
    reviewers:
      - name: python-specialist
        prompt: prompts/review-python.md
        focus: "Python quality, Pydantic 2 correctness, type safety, test quality, security, documentation"
      - name: rag-specialist
        prompt: prompts/review-rag.md
        focus: "Ragas integration, metric design, N/A semantics, knowledge matching, context synthesis"
        condition: '{{ or (contains .Triage.CodeArea "metrics") (contains .Triage.CodeArea "ragas") (contains .Triage.CodeArea "ground_truth") (contains .Triage.CodeArea "adapters") (contains .Triage.CodeArea "knowledge") }}'
    rework:
      target: implement

  - name: submit
    prompt: prompts/submit.md
    schema: schemas/submit.json
    tools:
      - Bash(git:*)
      - Bash(gh:*)
    timeout: 3m
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - implement
      - verify
      - review

  - name: follow-up
    type: post-submit
    prompt: prompts/follow-up.md
    tools:
      - Bash(gh:*)
    timeout: 3m
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - review
      - submit

  # monitor phase disabled — we handle PR review manually
