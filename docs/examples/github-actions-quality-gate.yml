# RAKI CI Quality Gate — GitHub Actions Example
#
# This workflow shows how to integrate RAKI into your CI pipeline:
#   1. Install RAKI
#   2. Validate manifest and session data
#   3. Run operational metrics (no LLM, every PR)
#   4. Run full evaluation with Ragas metrics (nightly, with threshold)
#   5. Upload report artifacts
#
# Copy this file into your repository as .github/workflows/raki-quality-gate.yml
# and adjust paths, thresholds, and schedule to fit your project.

name: RAG Quality Gate

on:
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 03:00 UTC — runs full LLM-backed evaluation
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  # ── Step 1: Validate manifest and session data ────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install RAKI
        run: uv sync --python 3.12 --all-extras

      - name: Validate manifest
        run: uv run raki validate --manifest raki.yaml

  # ── Step 2: Operational gate (every PR, no LLM) ───────────────────────
  operational-gate:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install RAKI
        run: uv sync --python 3.12 --all-extras

      - name: Run operational metrics
        run: |
          uv run raki run \
            --manifest raki.yaml \
            --no-llm \
            --output results/ \
            --quiet

      - name: Upload operational report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raki-operational-report
          path: results/
          retention-days: 30

  # ── Step 3: Full evaluation with LLM metrics (nightly only) ───────────
  nightly-llm-gate:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    env:
      # Configure your LLM provider credentials as repository secrets.
      # For direct Anthropic API:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # For Vertex AI Anthropic (default provider):
      # GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SA_KEY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install RAKI
        run: uv sync --python 3.12 --all-extras

      - name: Run full evaluation with threshold
        run: |
          uv run raki run \
            --manifest raki.yaml \
            --judge-provider anthropic \
            --threshold 0.7 \
            --include-sessions \
            --output results/ \
            --quiet

      - name: Upload full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raki-full-report
          path: results/
          retention-days: 90
